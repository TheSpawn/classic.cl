<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Classic Producciones — Pronto</title>
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/assets/img/favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/assets/img/favicon/favicon-16x16.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --gold: #d4a017;
        --gold-light: #e8b730;
        --gold-gradient: linear-gradient(
          135deg,
          #d4a017 0%,
          #e8b730 50%,
          #d4a017 100%
        );
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", system-ui, sans-serif;
        background: #0a0a0a;
        color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
        position: relative;
        overflow: hidden;
      }
      body::before {
        content: "";
        position: absolute;
        top: -30%;
        right: -15%;
        width: 700px;
        height: 700px;
        background: radial-gradient(
          circle,
          rgba(212, 160, 23, 0.06) 0%,
          transparent 70%
        );
        border-radius: 50%;
        animation: pulse 8s ease-in-out infinite;
      }
      body::after {
        content: "";
        position: absolute;
        bottom: -20%;
        left: -10%;
        width: 500px;
        height: 500px;
        background: radial-gradient(
          circle,
          rgba(212, 160, 23, 0.04) 0%,
          transparent 60%
        );
        border-radius: 50%;
      }
      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.5;
        }
        50% {
          transform: scale(1.1);
          opacity: 1;
        }
      }
      .content {
        position: relative;
        z-index: 1;
        max-width: 500px;
      }
      .logo {
        height: 50px;
        margin-bottom: 3rem;
        opacity: 0.9;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.35rem 1rem;
        border: 1px solid rgba(212, 160, 23, 0.25);
        border-radius: 100px;
        font-size: 0.65rem;
        font-weight: 700;
        color: var(--gold-light);
        letter-spacing: 0.15em;
        text-transform: uppercase;
        background: rgba(212, 160, 23, 0.05);
        margin-bottom: 2rem;
      }
      h1 {
        font-size: clamp(2rem, 5vw, 3rem);
        font-weight: 900;
        line-height: 1.1;
        margin-bottom: 1.2rem;
      }
      h1 .gold {
        background: var(--gold-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      p {
        color: #777;
        font-size: 0.95rem;
        line-height: 1.7;
        margin-bottom: 2.5rem;
      }
      .social {
        display: flex;
        justify-content: center;
        gap: 0.6rem;
        margin-bottom: 3rem;
      }
      .social a {
        width: 38px;
        height: 38px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(255, 255, 255, 0.4);
        text-decoration: none;
        font-size: 0.9rem;
        transition: all 0.2s;
      }
      .social a:hover {
        border-color: var(--gold);
        color: var(--gold);
      }
      .social svg {
        width: 18px;
        height: 18px;
        fill: currentColor;
      }
      .footer {
        position: absolute;
        bottom: 2rem;
        color: rgba(255, 255, 255, 0.2);
        font-size: 0.7rem;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <div class="content">
      <img
        src="/assets/img/ClassicEventosLogoBlanco.webp"
        alt="Classic Producciones"
        class="logo"
      />

      <div class="badge">Sitio en construccion</div>

      <h1>Algo <span class="gold">grande</span> viene en camino</h1>

      <p>
        Estamos preparando nuestra nueva plataforma. Mientras tanto, siguenos en
        redes sociales para enterarte de todas las novedades.
      </p>

      <div class="social">
        <a
          href="https://www.instagram.com/classic_producciones"
          title="Instagram"
          target="_blank"
        >

            />

        </a>
        <a

          title="Facebook"
          target="_blank"
        >
          <svg viewBox="0 0 24 24">
            <path
              d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385h-3.047v-3.47h3.047v-2.642c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953h-1.514c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385c5.738-.9 10.126-5.864 10.126-11.854z"

        <a

          title="YouTube"
          target="_blank"
        >
          <svg viewBox="0 0 24 24">
            <path
              d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"
            />
          </svg>
        </a>
      </div>
    </div>

    <div class="footer">&copy; 2026 Classic Producciones</div>
  </body>
</html>
